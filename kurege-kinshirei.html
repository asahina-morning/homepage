<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クレゲ禁止令 | あさひな</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{
    min-height:100vh;
    margin:0;
    padding:60px 26px;
    background:linear-gradient(180deg,#ae9dd7,#8669b8);
    color:#fff;
    font-family:"Zen Maru Gothic",sans-serif;
    line-height:1.9;
}
.wrapper{max-width:760px;margin:auto;text-align:center;}
h1{margin:0 0 32px;font-size:2.2rem;}
.notice-image{
    display:block;
    width:100%;
    max-width:720px;
    height:auto;
    margin:0 auto 32px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.24);
    box-shadow:0 18px 42px rgba(0,0,0,.24);
}
.back-button{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:52px;
    padding:13px 24px;
    border:1px solid rgba(255,255,255,.48);
    border-radius:9999px;
    color:#171225;
    font-weight:800;
    letter-spacing:.03em;
    text-decoration:none;
    background:
        radial-gradient(circle at 28% 18%, rgba(255,255,255,.75), transparent 24%),
        linear-gradient(135deg, rgba(255,255,255,.34), rgba(255,255,255,.12));
    box-shadow:
        0 12px 30px rgba(62,38,112,.25),
        inset 0 1px 0 rgba(255,255,255,.72),
        inset 0 -10px 24px rgba(111,76,180,.18);
    transition:transform .18s ease,box-shadow .18s ease;
}
.back-button:hover{transform:translateY(-2px) scale(1.025);}
.back-button:active{transform:translateY(1px) scale(.99);}
@media (min-width:961px){
    body{padding:clamp(60px,8vh,96px) clamp(32px,5vw,80px);}
    .wrapper{max-width:900px;}
}
@media (max-width:600px){
    body{padding:32px 16px;}
    h1{margin-bottom:24px;font-size:1.55rem;line-height:1.5;}
    .notice-image{margin-bottom:24px;border-radius:14px;}
    .back-button{width:100%;}
}
</style>
</head>
<body>
<main class="wrapper">
    <h1>クレゲ禁止令</h1>
    <img class="notice-image" src="ピン留め用.png" alt="クレゲ禁止令の画像">
    <a class="back-button" href="index.html">戻る</a>
</main>
</body>
</html>
